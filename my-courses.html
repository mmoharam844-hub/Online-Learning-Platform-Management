<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>كورساتي - منصة د/ ممدوح محفوظ للأشعة التشخيصية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css?v=3">
  <link rel="stylesheet" href="css/base.css?v=3">
  <link rel="stylesheet" href="css/components.css?v=3">
  <link rel="stylesheet" href="css/layout.css?v=3">
  <link rel="stylesheet" href="css/pages/dashboard.css?v=3">
</head>
<body data-page="my-courses">

  <header class="header" id="header"></header>

  <main class="container" style="padding-top: var(--space-xl); padding-bottom: var(--space-3xl);">
    <div class="page-header" style="text-align: right;">
      <h1><i class="fas fa-book"></i> كورساتي</h1>
      <p>الكورسات التي اشتركت فيها</p>
    </div>

    <div class="grid grid-3" id="myCoursesGrid">
      <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:80%"></div><div class="skeleton skeleton-btn"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:70%"></div><div class="skeleton skeleton-btn"></div></div>
      <div class="skeleton-card"><div class="skeleton skeleton-title"></div><div class="skeleton skeleton-text"></div><div class="skeleton skeleton-text" style="width:85%"></div><div class="skeleton skeleton-btn"></div></div>
    </div>
  </main>

  <footer class="footer">
    <div class="container">
      <p>جميع الحقوق محفوظة &copy; Dr.Mamdouh 2026</p>
    </div>
  </footer>

  <div id="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/seed.js"></script>
  <script>
    if (!Auth.requireAuth()) throw new Error('redirect');

    const user = Auth.getCurrentUser();
    document.getElementById('header').innerHTML = Utils.renderHeader('my-courses');

    function loadMyCourses() {
      const approvedSubs = Storage.query('subscriptions', s => s.studentId === user.id && s.status === 'approved');
      const grid = document.getElementById('myCoursesGrid');

      if (approvedSubs.length === 0) {
        grid.innerHTML = `
          <div class="empty-state" style="grid-column: 1/-1;">
            <i class="fas fa-book-open"></i>
            <h3>لم تشترك في أي كورس بعد</h3>
            <p>تصفح الكورسات المتاحة واشترك الآن</p>
            <a href="dashboard.html" class="btn btn-primary" style="margin-top: 16px;">
              <i class="fas fa-search"></i> تصفح الكورسات
            </a>
          </div>
        `;
        return;
      }

      grid.innerHTML = approvedSubs.map(sub => {
        const course = Storage.getById('courses', sub.courseId);
        if (!course) return '';

        const lessons = Storage.query('lessons', l => l.courseId === course.id);
        const completed = Storage.query('progress', p => p.studentId === user.id && p.courseId === course.id && p.completed);
        const total = lessons.length;
        const done = completed.length;
        const percent = total > 0 ? Math.round((done / total) * 100) : 0;

        return `
          <div class="course-card">
            <div class="course-card-header">
              <h3>${course.name}</h3>
              <span class="grade-badge">${Utils.getGradeLabel(course.grade)}</span>
            </div>
            <div class="course-card-body">
              <p>${course.description}</p>
              <div class="progress-label">
                <span>التقدم</span>
                <span>${percent}% (${done}/${total} دروس)</span>
              </div>
              <div class="progress">
                <div class="progress-bar" style="width: ${percent}%"></div>
              </div>
              <a href="course-viewer.html?courseId=${course.id}" class="btn btn-primary btn-block" style="margin-top: 16px;">
                <i class="fas fa-play"></i> ${done > 0 ? 'متابعة الدراسة' : 'ابدأ الآن'}
              </a>
            </div>
          </div>
        `;
      }).join('');
    }

    loadMyCourses();
  </script>
</body>
</html>
