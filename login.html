<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>تسجيل الدخول - منصة د/ ممدوح محفوظ للأشعة التشخيصية</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Cairo:wght@300;400;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">
  <link rel="stylesheet" href="css/variables.css?v=2">
  <link rel="stylesheet" href="css/base.css?v=2">
  <link rel="stylesheet" href="css/components.css?v=2">
  <link rel="stylesheet" href="css/layout.css?v=2">
  <link rel="stylesheet" href="css/pages/auth.css?v=2">
</head>
<body data-page="login">

  <div class="auth-page">
    <div class="auth-card">
      <div class="auth-header">
        <img src="assets/images/logo.svg" alt="د/ ممدوح محفوظ">
        <h1>تسجيل الدخول</h1>
        <p>أهلاً بك مرة أخرى في منصة د/ ممدوح محفوظ</p>
      </div>

      <form id="loginForm">
        <div class="form-group">
          <label for="phone"><i class="fas fa-phone"></i> رقم الهاتف</label>
          <div class="phone-input">
            <input type="text" class="form-control country-code" value="+20" readonly>
            <input type="tel" id="phone" name="phone" class="form-control" placeholder="01012345678" value="01012345678" required>
          </div>
        </div>

        <div class="form-group">
          <label for="password"><i class="fas fa-lock"></i> كلمة المرور</label>
          <div class="password-wrapper">
            <input type="password" id="password" name="password" class="form-control" placeholder="أدخل كلمة المرور" value="123456" required>
            <button type="button" class="password-toggle" onclick="togglePassword('password', this)">
              <i class="fas fa-eye"></i>
            </button>
          </div>
        </div>

        <button type="submit" class="btn btn-primary btn-block btn-lg">
          <i class="fas fa-sign-in-alt"></i> تسجيل الدخول
        </button>
      </form>

      <div class="auth-footer">
        <p>ليس لديك حساب؟ <a href="register.html">إنشاء حساب جديد</a></p>
        <p style="margin-top: 8px;"><a href="index.html"><i class="fas fa-home"></i> العودة للرئيسية</a></p>
        <p style="margin-top: 8px;"><a href="admin/index.html" style="color: var(--text-muted);"><i class="fas fa-lock"></i> دخول كمعلم</a></p>
      </div>
    </div>
  </div>

  <div id="toast-container"></div>

  <script src="js/config.js"></script>
  <script src="js/storage.js"></script>
  <script src="js/auth.js"></script>
  <script src="js/utils.js"></script>
  <script src="js/seed.js"></script>
  <script>
    function togglePassword(inputId, btn) {
      const input = document.getElementById(inputId);
      const icon = btn.querySelector('i');
      if (input.type === 'password') {
        input.type = 'text';
        icon.classList.replace('fa-eye', 'fa-eye-slash');
      } else {
        input.type = 'password';
        icon.classList.replace('fa-eye-slash', 'fa-eye');
      }
    }

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const phone = document.getElementById('phone').value.trim();
      const password = document.getElementById('password').value;

      if (!phone || !password) {
        Utils.showToast('يرجى ملء جميع الحقول', 'error');
        return;
      }

      if (!Utils.validatePhone(phone)) {
        Utils.showToast('رقم الهاتف غير صحيح', 'error');
        return;
      }

      // Wait for seed data to finish loading
      if (window.seedReady) await window.seedReady;

      const result = await Auth.login(phone, password);
      if (result.success) {
        Utils.showToast(result.message, 'success');
        setTimeout(() => window.location.href = 'dashboard.html', 500);
      } else {
        Utils.showToast(result.message, 'error');
      }
    });
  </script>
</body>
</html>
